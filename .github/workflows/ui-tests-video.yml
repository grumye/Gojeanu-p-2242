name: UI tests with video

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test-and-record:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Install video tools
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg x11-utils

      - name: Run tests + record screen (Xvfb)
        env:
          CI: "true"
          DISPLAY: ":99"
        run: |
          mkdir -p artifacts

          # 1) Virtual display
          Xvfb :99 -screen 0 1920x1080x24 -ac +extension RANDR > artifacts/xvfb.log 2>&1 &
          sleep 2

          # 2) Check display
          echo "DISPLAY=$DISPLAY"
          xdpyinfo -display :99 > artifacts/xdpyinfo.txt 2>&1 || true

          # 3) Start recording (:99.0!)
          ffmpeg -y \
            -video_size 1920x1080 \
            -framerate 25 \
            -f x11grab -i :99.0 \
            -codec:v libx264 -pix_fmt yuv420p \
            artifacts/test-run.mp4 > artifacts/ffmpeg.log 2>&1 &
          FF_PID=$!

          sleep 2

          # 4) Run tests (do not fail job, we want video)
          mvn -q test || true

          sleep 2

          # 5) Stop recording
          kill $FF_PID || true
          sleep 1

      - name: Upload artifacts (video + logs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-video
          path: artifacts/**