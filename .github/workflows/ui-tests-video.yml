name: UI tests with video

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test-and-record:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Install Chrome + video tools
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg x11-utils google-chrome-stable

      - name: Run tests and record video
        env:
          CI: "true"
          DISPLAY: ":99"
        run: |
          mkdir -p artifacts

          # 1) Start virtual display
          Xvfb :99 -screen 0 1920x1080x24 -ac +extension RANDR > artifacts/xvfb.log 2>&1 &
          sleep 3

          echo "DISPLAY=$DISPLAY"

          # 2) Start recording
          ffmpeg -y \
            -video_size 1920x1080 \
            -framerate 25 \
            -f x11grab -i :99.0 \
            -codec:v libx264 -pix_fmt yuv420p \
            artifacts/test-run.mp4 > artifacts/ffmpeg.log 2>&1 &
          FF_PID=$!

          # Give recording time to start
          sleep 3

          # 3) Run tests (background so recording continues)
          mvn -q test > artifacts/mvn.log 2>&1 &
          MVN_PID=$!

          # Wait until tests finish
          wait $MVN_PID || true

          # Keep recording a little after tests finish
          sleep 3

          # 4) Stop recording gracefully
          kill -INT $FF_PID || true
          wait $FF_PID || true

      - name: Upload artifacts (video + logs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-video
          path: artifacts/**