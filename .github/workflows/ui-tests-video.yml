name: UI tests with video

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test-and-record:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg x11-utils google-chrome-stable

      - name: Run tests and record video
        env:
          CI: "true"
          DISPLAY: ":99"
        run: |
          mkdir -p artifacts

          # 1) Virtual display
          Xvfb :99 -screen 0 1920x1080x24 -ac +extension RANDR > artifacts/xvfb.log 2>&1 &
          sleep 2
          xdpyinfo -display :99 > artifacts/xdpyinfo.txt 2>&1 || true

          # 2) Start tests first (so Chrome starts while we prepare recording)
          mvn -q test > artifacts/mvn.log 2>&1 &
          MVN_PID=$!

          # 3) Wait a bit so browser appears early in the recording
          sleep 5

          # 4) Start recording
          ffmpeg -y \
            -video_size 1920x1080 \
            -framerate 25 \
            -f x11grab -i :99.0 \
            -codec:v libx264 -pix_fmt yuv420p \
            artifacts/test-run.mp4 > artifacts/ffmpeg.log 2>&1 &
          FF_PID=$!

          # 5) Wait until tests finish
          wait $MVN_PID || true

          # 6) Record a little after end
          sleep 3

          # 7) Stop recording gracefully
          kill -INT $FF_PID || true
          wait $FF_PID || true

      - name: Upload artifacts (video + logs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-video
          path: artifacts/**